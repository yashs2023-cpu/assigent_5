apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-results-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: student-results-app
  template:
    metadata:
      labels:
        app: student-results-app
    spec:
      containers:
      - name: student-results-app
        image: yourdockerusername/student-results-app:IMAGE_TAG
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: student-results-service
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
  selector:
    app: student-results-app